<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Engine | Live Terminal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }
        
        /* Auth Bar Styling */
        .auth-bar {
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 6px; 
            padding: 15px 20px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .status-disconnected { color: #ff7b72; font-weight: bold; }
        .status-connected { color: #3fb950; font-weight: bold; }
        .btn-auth { background: #1f6feb; border: none; padding: 10px 20px; font-weight: bold; }
        .btn-auth:hover { background: #388bfd; }

        .container { display: flex; gap: 20px; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; width: 50%; }
        .terminal { background: #000; padding: 15px; border-radius: 4px; height: 350px; overflow-y: auto; font-size: 0.9em; line-height: 1.4; }
        
        /* Log Entry Styling */
        .log-entry { margin-bottom: 12px; padding: 10px; border-left: 4px solid; word-wrap: break-word; }
        .APPROVED { border-color: #2ea043; background: rgba(46, 160, 67, 0.1); color: #3fb950; }
        .REJECTED { border-color: #f85149; background: rgba(248, 81, 73, 0.1); color: #ff7b72; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #2ea043; }
        label { font-weight: bold; color: #8b949e; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <h1>[ ALPHA ENGINE : QUANT DESK ]</h1>

    <div class="auth-bar">
        <div>
            Broker Connection: <span id="broker-status" class="status-disconnected">DISCONNECTED (Running Mock Data)</span>
        </div>
        <button id="auth-btn" class="btn-auth" onclick="window.location.href='/login'" style="width: auto; margin: 0;">AUTHORIZE ZERODHA API</button>
    </div>

    <div class="container">
        <div class="panel">
            <h3 style="margin-top: 0; color: #8b949e;">Inject Trade Signal</h3>
            
            <label>Instrument</label>
            <input type="text" id="inst" value="NIFTY 24000 CE" placeholder="e.g., SENSEX 75000 PE">
            
            <label>Signal Type</label>
            <select id="type">
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
            </select>

            <label>Entry Price (CMP / Limit)</label>
            <input type="number" id="entry" value="130" step="0.05">
            
            <label>Stop Loss (SL)</label>
            <input type="number" id="sl" value="90" step="0.05">
            
            <label>Target (TGT)</label>
            <input type="number" id="tgt" value="230" step="0.05">
            
            <button onclick="sendSignal()">EXECUTE AI RADAR</button>
        </div>

        <div class="panel">
            <h3 style="margin-top: 0; color: #8b949e;">Live Execution Logs</h3>
            <div class="terminal" id="terminal">
                <div style="color: #8b949e; font-style: italic;">System Initialized. Awaiting institutional flow data...</div>
            </div>
        </div>
    </div>

    <script>
        // Check URL parameters for successful login callback
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'connected') {
            const statusSpan = document.getElementById('broker-status');
            const authBtn = document.getElementById('auth-btn');
            
            statusSpan.className = 'status-connected';
            statusSpan.innerText = 'LIVE (L2 Data & Greeks Active)';
            
            authBtn.style.display = 'none'; // Hide button once connected
            
            // Clean up the URL so it looks professional
            window.history.replaceState({}, document.title, "/");
        }

        // WebSocket Connection for Live Logs
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${wsProtocol}://${window.location.host}/ws/logs`);

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const terminal = document.getElementById('terminal');
            
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${data.status}`;
            
            let message = `<strong>[${data.status}] ${data.instrument}</strong><br>${data.reason}`;
            if (data.status === 'APPROVED') {
                message += `<br><span style="color: #fff; font-weight: bold;">ACTION: Deploy ${data.recommended_qty} Units @ ₹${data.entry.toFixed(2)}</span>`;
                message += `<br><span style="color: #8b949e; font-size: 0.9em;">SL: ₹${data.sl.toFixed(2)} | TGT: ₹${data.target.toFixed(2)}</span>`;
            }

            logEntry.innerHTML = message;
            terminal.prepend(logEntry); // Add to the top of the terminal
        };

        // Send REST API Post request to backend
        async function sendSignal() {
            const payload = {
                instrument: document.getElementById('inst').value.trim(),
                type: document.getElementById('type').value,
                entry: parseFloat(document.getElementById('entry').value),
                sl: parseFloat(document.getElementById('sl').value),
                tgt: parseFloat(document.getElementById('tgt').value)
            };

            // Basic frontend validation to prevent empty submissions
            if (!payload.instrument || isNaN(payload.entry) || isNaN(payload.sl) || isNaN(payload.tgt)) {
                alert("Invalid input. Please check your numbers.");
                return;
            }

            try {
                await fetch('/api/signal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.error("Failed to send signal:", error);
            }
        }
    </script>
</body>
</html>
