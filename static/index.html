<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Engine | Live Terminal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .container { display: flex; gap: 20px; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; width: 50%; }
        .terminal { background: #000; padding: 15px; border-radius: 4px; height: 300px; overflow-y: auto; }
        .log-entry { margin-bottom: 10px; padding: 10px; border-left: 4px solid; }
        .APPROVED { border-color: #2ea043; background: rgba(46, 160, 67, 0.1); color: #3fb950; }
        .REJECTED { border-color: #f85149; background: rgba(248, 81, 73, 0.1); color: #ff7b72; }
        input, button { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 4px; }
        button { background: #238636; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        label { font-weight: bold; color: #8b949e; }
    </style>
</head>
<body>

    <h1>[ ALPHA ENGINE : QUANT DESK ]</h1>

    <div class="container">
        <div class="panel">
            <h3>Inject Signal</h3>
            <label>Instrument</label>
            <input type="text" id="inst" value="Sensex 75300 CE">
            
            <label>Entry Price (CMP)</label>
            <input type="number" id="entry" value="60">
            
            <label>Stop Loss (SL)</label>
            <input type="number" id="sl" value="0">
            
            <label>Target (TGT)</label>
            <input type="number" id="tgt" value="120">
            
            <button onclick="sendSignal()">RUN R:R KILL SWITCH</button>
        </div>

        <div class="panel">
            <h3>Live Execution Logs</h3>
            <div class="terminal" id="terminal">
                <div style="color: #8b949e;">System Initialized. Awaiting signals...</div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket Connection for Live Logs
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${wsProtocol}://${window.location.host}/ws/logs`);

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const terminal = document.getElementById('terminal');
            
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${data.status}`;
            
            let message = `<strong>[${data.status}] ${data.instrument}</strong><br>${data.reason}`;
            if (data.status === 'APPROVED') {
                message += `<br><em>Action: Execute ${data.recommended_qty} units.</em>`;
            }

            logEntry.innerHTML = message;
            terminal.prepend(logEntry);
        };

        // Send REST API Post request to backend
        async function sendSignal() {
            const payload = {
                instrument: document.getElementById('inst').value,
                entry: parseFloat(document.getElementById('entry').value),
                sl: parseFloat(document.getElementById('sl').value),
                tgt: parseFloat(document.getElementById('tgt').value)
            };

            await fetch('/api/signal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
