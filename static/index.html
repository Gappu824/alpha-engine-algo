<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Engine | Live Terminal</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }
        
        /* Auth Bar Styling */
        .auth-bar { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 15px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .status-disconnected { color: #ff7b72; font-weight: bold; }
        .status-connected { color: #3fb950; font-weight: bold; }
        .auth-controls { display: flex; gap: 10px; flex-grow: 1; max-width: 600px; }
        
        .container { display: flex; gap: 20px; }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; width: 50%; }
        .terminal { background: #000; padding: 15px; border-radius: 4px; height: 350px; overflow-y: auto; font-size: 0.9em; line-height: 1.4; }
        
        .log-entry { margin-bottom: 12px; padding: 10px; border-left: 4px solid; word-wrap: break-word; }
        .APPROVED { border-color: #2ea043; background: rgba(46, 160, 67, 0.1); color: #3fb950; }
        .REJECTED { border-color: #f85149; background: rgba(248, 81, 73, 0.1); color: #ff7b72; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        .btn-blue { background: #1f6feb; margin: 5px 0 15px 0; }
        .btn-blue:hover { background: #388bfd; }
        label { font-weight: bold; color: #8b949e; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <h1>[ ALPHA ENGINE : QUANT DESK ]</h1>

    <div class="auth-bar" id="auth-section">
        <div style="min-width: 250px;">
            Broker Connection:<br><span id="broker-status" class="status-disconnected">DISCONNECTED (Mock Data)</span>
        </div>
        
        <div class="auth-controls" id="auth-controls">
            <button class="btn-blue" onclick="window.open('/login', '_blank')" style="white-space: nowrap; width: 200px;">1. GET TOKEN</button>
            <input type="text" id="req-token" placeholder="2. Paste Request Token Here..." style="margin-bottom: 5px;">
            <button onclick="connectBroker()" style="width: 150px; margin-bottom: 5px;">3. CONNECT</button>
        </div>
        
        <div id="access-token-display" style="display: none; flex-grow: 1;">
            <label style="margin-bottom: 0;">Live Access Token (For other apps):</label>
            <input type="text" id="acc-token" readonly style="margin-bottom: 0; background: #000; color: #58a6ff; font-weight: bold; cursor: text;" onclick="this.select()">
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h3 style="margin-top: 0; color: #8b949e;">Inject Trade Signal</h3>
            <label>Instrument</label>
            <input type="text" id="inst" value="NIFTY 24000 CE">
            <label>Signal Type</label>
            <select id="type"><option value="BUY">BUY</option><option value="SELL">SELL</option></select>
            <label>Entry Price</label>
            <input type="number" id="entry" value="130" step="0.05">
            <label>Stop Loss (SL)</label>
            <input type="number" id="sl" value="90" step="0.05">
            <label>Target (TGT)</label>
            <input type="number" id="tgt" value="230" step="0.05">
            <button onclick="sendSignal()">EXECUTE AI RADAR</button>
        </div>

        <div class="panel">
            <h3 style="margin-top: 0; color: #8b949e;">Live Execution Logs</h3>
            <div class="terminal" id="terminal">
                <div style="color: #8b949e; font-style: italic;">System Initialized. Awaiting institutional flow data...</div>
            </div>
        </div>
    </div>

    <script>
        // WebSocket Connection
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${wsProtocol}://${window.location.host}/ws/logs`);

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const terminal = document.getElementById('terminal');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${data.status}`;
            
            let message = `<strong>[${data.status}] ${data.instrument}</strong><br>${data.reason}`;
            if (data.status === 'APPROVED') {
                message += `<br><span style="color: #fff; font-weight: bold;">ACTION: Deploy ${data.recommended_qty} Units @ ₹${data.entry.toFixed(2)}</span>`;
                message += `<br><span style="color: #8b949e; font-size: 0.9em;">SL: ₹${data.sl.toFixed(2)} | TGT: ₹${data.target.toFixed(2)}</span>`;
            }
            logEntry.innerHTML = message;
            terminal.prepend(logEntry);
        };

        // Connect Broker via Pasted Token
        async function connectBroker() {
            const reqToken = document.getElementById('req-token').value.trim();
            if(!reqToken) { alert("Please paste the request token first."); return; }

            const response = await fetch('/api/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ request_token: reqToken })
            });
            
            const result = await response.json();
            
            if(result.status === "success") {
                document.getElementById('broker-status').className = 'status-connected';
                document.getElementById('broker-status').innerText = 'LIVE (L2 Data & Greeks Active)';
                document.getElementById('auth-controls').style.display = 'none';
                
                // Show access token for external apps
                document.getElementById('access-token-display').style.display = 'block';
                document.getElementById('acc-token').value = result.access_token;
            } else {
                alert("Auth Failed: " + result.message);
            }
        }

        // Send Trade Signal
        async function sendSignal() {
            const payload = {
                instrument: document.getElementById('inst').value.trim(),
                type: document.getElementById('type').value,
                entry: parseFloat(document.getElementById('entry').value),
                sl: parseFloat(document.getElementById('sl').value),
                tgt: parseFloat(document.getElementById('tgt').value)
            };
            await fetch('/api/signal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
    </script>
</body>
</html>
